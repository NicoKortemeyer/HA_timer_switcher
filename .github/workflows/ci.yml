name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest voluptuous

      - name: Run tests
        run: pytest tests/ -v --tb=short

  typescript:
    name: TypeScript Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd lovelace-card && npm ci

      - name: Build card
        run: cd lovelace-card && npm run build

      - name: Check output
        run: test -f lovelace-card/dist/once-timer-card.js && echo "Build output exists"
