start:
  name: Start Once Timer
  description: Schedule a one-shot action on an entity.
  fields:
    entity_id:
      name: Entity
      description: The entity to control (light, switch, fan, etc.).
      required: true
      selector:
        entity:
          domain:
            - light
            - switch
            - fan
            - media_player
            - climate
            - cover
            - lock
            - vacuum
            - input_boolean
            - automation
            - script
            - alarm_control_panel
    action:
      name: Action
      description: The action to perform (e.g. turn_on, turn_off, toggle, media_play).
      required: true
      selector:
        text:
    mode:
      name: Mode
      description: Whether to use a delay or an absolute time.
      required: true
      selector:
        select:
          options:
            - delay
            - absolute_time
    delay_minutes:
      name: Delay (minutes)
      description: Required when mode is 'delay'. How many minutes to wait.
      selector:
        number:
          min: 0.1
          max: 10080
          step: 0.5
          unit_of_measurement: min
    run_at:
      name: Run at
      description: Required when mode is 'absolute_time'. ISO8601 datetime string.
      selector:
        text:

cancel:
  name: Cancel Once Timer
  description: Cancel a scheduled once-timer by its ID.
  fields:
    schedule_id:
      name: Schedule ID
      description: The UUID of the schedule to cancel.
      required: true
      selector:
        text:

preview:
  name: Preview Once Timer
  description: Retrieve details of a scheduled once-timer.
  fields:
    schedule_id:
      name: Schedule ID
      description: The UUID of the schedule to preview.
      required: true
      selector:
        text:

save_preset:
  name: Save Preset
  description: Save the current timer configuration as a named preset.
  fields:
    name:
      name: Preset Name
      required: true
      selector:
        text:
    entity_id:
      name: Entity
      required: true
      selector:
        entity:
          domain:
            - light
            - switch
            - fan
            - media_player
            - climate
            - cover
            - lock
            - vacuum
            - input_boolean
            - automation
            - script
            - alarm_control_panel
    action:
      name: Action
      description: The action to perform (e.g. turn_on, turn_off, toggle, media_play).
      required: true
      selector:
        text:
    mode:
      name: Mode
      required: true
      selector:
        select:
          options:
            - delay
            - absolute_time
    delay_minutes:
      name: Delay (minutes)
      selector:
        number:
          min: 0.1
          max: 10080
          step: 0.5
          unit_of_measurement: min

load_preset:
  name: Load Preset
  description: Load a saved preset into the pending configuration.
  fields:
    name:
      name: Preset Name
      required: true
      selector:
        text:

delete_preset:
  name: Delete Preset
  description: Delete a saved preset by name.
  fields:
    name:
      name: Preset Name
      required: true
      selector:
        text:
