<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <circle cx="64" cy="64" r="64" fill="#1565C0"/>

  <!-- Outer clock ring -->
  <circle cx="64" cy="66" r="40" fill="none" stroke="white" stroke-width="4" opacity="0.9"/>

  <!-- Clock hour markers -->
  <line x1="64" y1="29" x2="64" y2="35" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="97" x2="64" y2="103" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="27" y1="66" x2="33" y2="66" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="95" y1="66" x2="101" y2="66" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Hour hand (pointing ~10 o'clock) -->
  <line x1="64" y1="66" x2="47" y2="49" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~12 o'clock) -->
  <line x1="64" y1="66" x2="64" y2="36" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="64" cy="66" r="5" fill="white"/>

  <!-- "Once" badge: small circle bottom-right with checkmark -->
  <circle cx="96" cy="96" r="18" fill="#43A047"/>
  <polyline points="87,96 93,103 106,89" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
